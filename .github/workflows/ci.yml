name: Continuous Integration

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # --------------------------------------------------------
  # 1. Go バックエンドのテストジョブ
  # --------------------------------------------------------
  go-backend-test:
    name: Go Backend Test (-race)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: apps/go-api/go.sum

      - name: Install dependencies
        run: |
          cd apps/go-api
          go mod download

      - name: Run Race Hazard Test
        run: |
          cd apps/go-api
          go test -v -race ./...

  # --------------------------------------------------------
  # 2. Next.js フロントエンドのテストジョブ
  # --------------------------------------------------------
  next-frontend-test:
    name: Next.js Frontend Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/next-app/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/next-app
          npm ci

      - name: Run Type Compilation Test
        run: |
          cd apps/next-app
          npm run test:types